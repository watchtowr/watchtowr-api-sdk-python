# ──────────────────────────────────────────────────────────────────────────────
# Socket.dev project configuration.
# Reference: https://docs.socket.dev/docs/socket-yml
#
# The hard 7-day age block lives in the package-manager configs and the
# GitHub Actions workflow. This file is defense-in-depth: it enables the
# Socket alerts that flag suspicious freshly-published packages in PR
# review (newAuthor, unstableOwnership) plus the usual malware checks.
#
# NOTE: Socket.dev does NOT have a dedicated "package age" alert. Tune the
# action (Block / Warn / Monitor / Ignore) for each rule in the dashboard:
#   socket.dev → your org → Security Policy
# ──────────────────────────────────────────────────────────────────────────────
version: 2

projectIgnorePaths:
  - "test/**"
  - "tests/**"
  - "**/__tests__/**"
  - "**/*.test.*"
  - "**/*.spec.*"

issueRules:
  # Malware / high-severity supply-chain alerts
  malware: true
  gptMalware: true
  gptSecurity: true
  gptAnomaly: true
  trojanSource: true
  obfuscatedFile: true
  obfuscatedRequire: true
  shellAccess: true
  shellScriptOverride: true
  installScripts: true
  binScriptConfusion: true
  envVars: true
  filesystemAccess: true
  networkAccess: true
  telemetry: true
  debugAccess: true

  # Freshness / maintainer signals — these back up the 7-day cooldown by
  # flagging packages with no track record yet.
  newAuthor: true
  unstableOwnership: true
  unmaintained: true
  unpopularPackage: true
  unresolvedRequire: true
  didYouMean: true       # typosquat

  # Hygiene
  typeModuleCompatibility: true
  licenseChange: true
  deprecated: true
  unsupportedEngine: true

githubApp:
  enabled: true
  projectReportCard: true
  pullRequestAlertsEnabled: true
